<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:" />
  <title>RinoMask</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="titlebar">
    <div class="tb-brand">
      <span class="logo-mark tb-logo"></span>
      <span>RinoMask</span>
    </div>
  </div>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo"><span class="logo-mark"></span></div>
        <div><b>RinoMask</b><span>ANTIDETECT</span></div>
      </div>
      <div id="nav"></div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="search" type="text" placeholder="Buscar por nome ou nota…" />
        </div>
        <div class="filters">
          <select id="filter-status"><option value="">Todos os status</option></select>
          <select id="filter-tag"><option value="">Todas as tags</option></select>
        </div>
        <div class="spacer"></div>
        <button id="btn-sync" class="ghost">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 15l6-6"/><path d="M10.5 6.5l1-1a4 4 0 0 1 5.7 5.7l-1 1"/><path d="M13.5 17.5l-1 1a4 4 0 0 1-5.7-5.7l1-1"/></svg>
          Sincronizar
        </button>
        <button id="btn-quick" class="ghost" title="Cria na hora um perfil com fingerprint aleatória e coerente">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 10.5c0 3.2-.1 5.6-1.1 8.7"/>
            <path d="M8.2 10.8a3.8 3.8 0 0 1 7.6.2c0 4-.8 6-1.1 7.4"/>
            <path d="M4.8 12.2a7.2 7.2 0 0 1 14.4-.2c0 1.3-.05 2.6-.4 4.3"/>
            <path d="M9.7 13.4c.1 2.2-.3 3.9-1.1 5.9"/>
            <path d="M2.5 9.2A9.5 9.5 0 0 1 12 3.5a9.5 9.5 0 0 1 6.3 2.4"/>
          </svg>
          Perfil rápido
        </button>
        <button id="btn-new" class="primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          Novo perfil
        </button>
      </div>

      <div id="syncbar" class="syncbar" style="display:none"></div>
      <div id="bulkbar" class="bulkbar" style="display:none"></div>

      <div class="table-wrap">
        <table id="table">
          <thead>
            <tr>
              <th style="width:34px"><input type="checkbox" id="check-all" /></th>
              <th style="width:18px"></th>
              <th>Perfil</th>
              <th style="width:170px">Tags</th>
              <th style="width:90px">SO</th>
              <th style="width:200px">Proxy</th>
              <th style="width:130px">Último uso</th>
              <th style="width:120px"></th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
        <div id="empty" class="empty" style="display:none">
          <div class="big"><span class="logo-mark"></span></div>
          <div>Nenhum perfil aqui ainda.</div>
        </div>
      </div>
    </main>
  </div>

  <div id="modal-root" class="modal-root"><div class="scrim"></div></div>
  <div id="ctx" class="ctx"></div>
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
